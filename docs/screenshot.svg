<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38e1c6"/><stop offset="1" stop-color="#6aa8ff"/></linearGradient>
  </defs>
  <rect width="1000" height="620" fill="#0b1020"/>

  <!-- topbar -->
  <text x="28" y="40" fill="#e7ecf6" font-size="20" font-weight="900">🌍 World<tspan fill="#38e1c6">Clock</tspan></text>
  <text x="820" y="40" fill="#38e1c6" font-size="12.5" font-weight="600">🔒 Offline · private</text>
  <line x1="0" y1="60" x2="1000" y2="60" stroke="#283356"/>

  <!-- hero -->
  <text x="500" y="108" fill="#e7ecf6" font-size="34" font-weight="900" text-anchor="middle">What time is it <tspan fill="url(#grad)">everywhere</tspan>?</text>

  <!-- search -->
  <rect x="40" y="132" width="700" height="46" rx="12" fill="#131a2e" stroke="#283356"/>
  <text x="58" y="160" fill="#8a96b4" font-size="15">🔎 Add a city (e.g. Tokyo, Berlin, New York)…</text>
  <rect x="752" y="132" width="100" height="46" rx="10" fill="#131a2e" stroke="#283356"/><text x="802" y="160" fill="#8a96b4" font-size="13" text-anchor="middle">☐ 12-hour</text>
  <rect x="864" y="132" width="96" height="46" rx="10" fill="#1b2540" stroke="#283356"/><text x="912" y="160" fill="#e7ecf6" font-size="13" text-anchor="middle" font-weight="700">Reset</text>

  <!-- clock cards -->
  <g>
    <rect x="40" y="196" width="222" height="118" rx="14" fill="#131a2e" stroke="#38e1c6"/>
    <text x="58" y="228" font-size="22">🇮🇳</text><text x="90" y="222" fill="#e7ecf6" font-size="15" font-weight="700">Mumbai</text><text x="90" y="240" fill="#8a96b4" font-size="12">India</text>
    <text x="58" y="280" fill="#e7ecf6" font-size="30" font-weight="700" font-family="JetBrains Mono, monospace">17:30 ☀️</text>
    <text x="58" y="302" fill="#8a96b4" font-size="12">Thu, Jun 18 · UTC+05:30 · reference</text>

    <rect x="278" y="196" width="222" height="118" rx="14" fill="#131a2e" stroke="#283356"/>
    <text x="296" y="228" font-size="22">🇺🇸</text><text x="328" y="222" fill="#e7ecf6" font-size="15" font-weight="700">New York</text><text x="328" y="240" fill="#8a96b4" font-size="12">USA</text>
    <text x="296" y="280" fill="#e7ecf6" font-size="30" font-weight="700" font-family="JetBrains Mono, monospace">08:00 ☀️</text>
    <text x="296" y="302" fill="#8a96b4" font-size="12">Thu, Jun 18 · UTC-04:00</text>

    <rect x="516" y="196" width="222" height="118" rx="14" fill="#131a2e" stroke="#283356"/>
    <text x="534" y="228" font-size="22">🇬🇧</text><text x="566" y="222" fill="#e7ecf6" font-size="15" font-weight="700">London</text><text x="566" y="240" fill="#8a96b4" font-size="12">United Kingdom</text>
    <text x="534" y="280" fill="#e7ecf6" font-size="30" font-weight="700" font-family="JetBrains Mono, monospace">13:00 ☀️</text>
    <text x="534" y="302" fill="#8a96b4" font-size="12">Thu, Jun 18 · UTC+01:00</text>

    <rect x="754" y="196" width="206" height="118" rx="14" fill="#131a2e" stroke="#283356"/>
    <text x="772" y="228" font-size="22">🇯🇵</text><text x="804" y="222" fill="#e7ecf6" font-size="15" font-weight="700">Tokyo</text><text x="804" y="240" fill="#8a96b4" font-size="12">Japan</text>
    <text x="772" y="280" fill="#e7ecf6" font-size="30" font-weight="700" font-family="JetBrains Mono, monospace">21:00 🌙</text>
    <text x="772" y="302" fill="#8a96b4" font-size="12">Thu, Jun 18 · UTC+09:00</text>
  </g>

  <!-- planner -->
  <rect x="40" y="332" width="920" height="256" rx="14" fill="#131a2e" stroke="#283356"/>
  <text x="60" y="364" fill="#e7ecf6" font-size="17" font-weight="800">🗓️ Meeting planner</text>
  <text x="780" y="364" fill="#38e1c6" font-size="12.5" font-weight="600">Reference: Mumbai</text>
  <text x="60" y="386" fill="#8a96b4" font-size="12">Green = working hours · highlighted column = everyone's available</text>

  <!-- grid -->
  <g font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">
    <!-- labels -->
    <text x="98" y="420" fill="#e7ecf6" font-size="12" text-anchor="start">🇮🇳 Mumbai</text>
    <text x="98" y="448" fill="#e7ecf6" font-size="12" text-anchor="start">🇺🇸 New York</text>
    <text x="98" y="476" fill="#e7ecf6" font-size="12" text-anchor="start">🇬🇧 London</text>
    <text x="98" y="504" fill="#e7ecf6" font-size="12" text-anchor="start">🇯🇵 Tokyo</text>
    <!-- a window of columns 12..20 -->
    <g>
      <!-- header -->
      <g fill="#8a96b4">
        <text x="220" y="404">12</text><text x="262" y="404">13</text>
        <rect x="284" y="394" width="40" height="184" rx="5" fill="#fbbf2433"/>
        <text x="304" y="404" fill="#fbbf24" font-weight="700">14</text>
        <text x="346" y="404">15</text><text x="388" y="404">16</text><text x="430" y="404">17</text><text x="472" y="404">18</text>
      </g>
      <!-- Mumbai row (working most) -->
      <g>
        <rect x="200" y="410" width="40" height="20" rx="5" fill="#34d39929"/><text x="220" y="424" fill="#34d399">12</text>
        <rect x="242" y="410" width="40" height="20" rx="5" fill="#34d39929"/><text x="262" y="424" fill="#34d399">13</text>
        <text x="304" y="424" fill="#fbbf24" font-weight="700">14</text>
        <rect x="326" y="410" width="40" height="20" rx="5" fill="#34d39929"/><text x="346" y="424" fill="#34d399">15</text>
        <rect x="368" y="410" width="40" height="20" rx="5" fill="#34d39929"/><text x="388" y="424" fill="#34d399">16</text>
        <rect x="410" y="410" width="40" height="20" rx="5" fill="#34d39929"/><text x="430" y="424" fill="#34d399">17</text>
        <text x="472" y="424" fill="#8a96b4">18</text>
      </g>
      <!-- NY row -->
      <g fill="#8a96b4">
        <text x="220" y="452">02</text><text x="262" y="452">03</text><text x="304" y="452" fill="#fbbf24" font-weight="700">04</text>
        <rect x="326" y="438" width="40" height="20" rx="5" fill="#34d39929"/><text x="346" y="452" fill="#34d399">05</text>
        <text x="388" y="452">06</text><text x="430" y="452">07</text><text x="472" y="452">08</text>
      </g>
      <!-- London row -->
      <g>
        <rect x="200" y="466" width="290" height="20" rx="5" fill="#34d39920"/>
        <text x="220" y="480" fill="#34d399">07</text><text x="262" y="480" fill="#34d399">08</text>
        <text x="304" y="480" fill="#fbbf24" font-weight="700">09</text>
        <text x="346" y="480" fill="#34d399">10</text><text x="388" y="480" fill="#34d399">11</text><text x="430" y="480" fill="#34d399">12</text><text x="472" y="480" fill="#34d399">13</text>
      </g>
      <!-- Tokyo row -->
      <g fill="#8a96b4">
        <text x="220" y="508">16</text><text x="262" y="508">17</text>
        <rect x="284" y="494" width="40" height="20" rx="5" fill="#34d39929"/><text x="304" y="508" fill="#fbbf24" font-weight="700">18</text>
        <text x="346" y="508">19</text><text x="388" y="508">20</text><text x="430" y="508">21</text><text x="472" y="508">22</text>
      </g>
    </g>
  </g>
  <rect x="60" y="534" width="880" height="38" rx="10" fill="#0b1020" stroke="#34d39955"/>
  <text x="76" y="558" fill="#34d399" font-size="13" font-weight="700">🟢 Best meeting window: 14:00–15:00 in Mumbai — works for all 4 cities</text>
</svg>
